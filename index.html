<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Utama Pembelajaran</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --accent-math: #ec4899;
            --accent-arab: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            overflow-x: hidden;
            position: relative;
        }

        .version-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .cards-container {
            display: flex;
            gap: 40px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            width: 320px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--accent);
            opacity: 0.8;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.3);
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .card:hover .card-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card p {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        .card-btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 30px;
            background: var(--accent);
            color: white;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card:hover .card-btn {
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            filter: brightness(1.1);
        }

        .card.math { --accent: var(--accent-math); }
        .card.arab { --accent: var(--accent-arab); }

        /* Floating particles effect */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0.1;
            pointer-events: none;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.2; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        @media (max-width: 768px) {
            body { justify-content: flex-start; padding: 60px 0 40px 0; }
            header { margin-bottom: 30px; padding: 0 15px; }
            h1 { font-size: 2rem; }
            p { font-size: 1rem; }
            .cards-container { gap: 20px; padding: 10px; }
            .card { width: 100%; max-width: 280px; padding: 25px; }
            .card-icon { font-size: 3rem; margin-bottom: 10px; }
            .card h2 { font-size: 1.5rem; }
            .version-badge { font-size: 10px; padding: 3px 8px; top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <div class="version-badge">v1.0.2</div>

    <header>
        <h1>Portal Pembelajaran</h1>
        <p>Pilih subjek untuk memulakan sesi pembelajaran</p>
    </header>

    <div class="cards-container">
        <a href="matematik-darjah2/index.html" class="card math">
            <div class="card-icon">🔢</div>
            <h2>Matematik</h2>
            <p>Latihan interaktif Matematik Darjah 2 Jilid 1</p>
            <span class="card-btn">Mula Belajar</span>
        </a>

        <a href="bahasa-arab.html" class="card arab">
            <div class="card-icon">🕌</div>
            <h2>Bahasa Arab Darjah 2</h2>
            <p>Nota & kuiz Bahasa Arab KAFA (Negeri Selangor)</p>
            <span class="card-btn">Mula Belajar</span>
        </a>
    </div>

    <script>
        // Create simple particle effects
        for(let i=0; i<15; i++) {
            let particle = document.createElement('div');
            particle.className = 'particle';
            let size = Math.random() * 20 + 5;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
            particle.style.animationDelay = (Math.random() * 5) + 's';
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
