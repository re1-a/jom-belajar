<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papan Pemuka Ibu Bapa — Sains Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family:'Inter',Arial,sans-serif; background:#f6f4ee; color:#1f2a36; margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; }
        .container { width:100%; max-width:820px; }
        .btn-back { display:inline-block; margin-bottom:16px; padding:10px 20px; background:#2E86DE; color:#fff; text-decoration:none; border-radius:8px; font-weight:600; font-size:.9rem; }
        h1 { font-size:1.5rem; margin-bottom:8px; padding-bottom:12px; border-bottom:3px solid #2E86DE; }
        .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin:20px 0 28px; }
        .stat-card { background:#fff; border-radius:12px; padding:16px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.06); }
        .stat-card .label { font-size:.8rem; color:#7f8c8d; margin-bottom:6px; font-weight:600; }
        .stat-card .value { font-size:1.8rem; font-weight:700; }
        .section-title { font-size:1.1rem; font-weight:700; margin:24px 0 12px; }
        .unit-grid { display:flex; flex-direction:column; gap:8px; margin-bottom:28px; }
        .unit-row { display:flex; align-items:center; gap:12px; background:#fff; border-radius:10px; padding:12px 16px; box-shadow:0 2px 6px rgba(0,0,0,.04); }
        .unit-row .emoji { font-size:1.4rem; }
        .unit-row .info { flex:1; }
        .unit-row .info .name { font-weight:600; font-size:.92rem; }
        .unit-row .info .detail { font-size:.78rem; color:#7f8c8d; }
        .unit-row .stars { font-size:.95rem; letter-spacing:2px; }
        .unit-row .score-badge { font-weight:700; font-size:.85rem; padding:4px 10px; border-radius:20px; white-space:nowrap; }
        .score-badge.great{background:#d4f4e2;color:#136b3d;} .score-badge.ok{background:#fceBD8;color:#93470f;}
        .score-badge.weak{background:#fadbd8;color:#922b21;} .score-badge.none{background:#eceae1;color:#7f8c8d;}
        .chart-box { background:#fff; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,.06); margin-bottom:24px; }
        .chart-box canvas { max-height:300px; }
        .note { background:#eaf3fc; border-radius:10px; padding:14px 16px; font-size:.86rem; color:#1b6fc4; margin-bottom:20px; line-height:1.5; }
        .btn-danger { padding:10px 20px; background:#e74c3c; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:600; font-size:.9rem; margin-top:8px; }
        @media (max-width:500px){ .stats-row{grid-template-columns:repeat(2,1fr);} }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="btn-back">⬅️ Kembali ke Peta</a>
        <h1>📊 Analisis Prestasi Sains — Aqil</h1>

        <div class="stats-row" id="stats-row"></div>

        <div class="section-title">📋 Pecahan Mengikut Unit</div>
        <div class="unit-grid" id="unit-grid"></div>

        <div class="section-title">📈 Skor Terbaik Setiap Unit</div>
        <div class="chart-box"><canvas id="scoreChart"></canvas></div>

        <div class="note" id="audio-note"></div>

        <button class="btn-danger" onclick="confirmClear()">🗑️ Padam Semua Rekod</button>
    </div>

    <script src="js/notes_data.js"></script>
    <script src="js/sains_audio_db.js" onerror=""></script>
    <script src="js/engine.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const state = getParentStats();
            const statsRow = document.getElementById('stats-row');
            statsRow.innerHTML = `
                <div class="stat-card"><div class="label">Streak Harian</div><div class="value">🔥 ${state.streak}</div></div>
                <div class="stat-card"><div class="label">Kemajuan</div><div class="value">${state.totalProgress}%</div></div>
                <div class="stat-card"><div class="label">Unit Selesai</div><div class="value">${state.completedUnits.length} / ${UNITS.length}</div></div>
                <div class="stat-card"><div class="label">Lencana</div><div class="value">${state.badges.length}</div></div>`;

            const unitGrid = document.getElementById('unit-grid');
            const labels=[], data=[], colors=[];
            UNITS.forEach(unit => {
                const score = state.quizScores[unit.id];
                const completed = state.completedUnits.includes(unit.id);
                let badgeClass='none', badgeText='Belum cuba';
                if (score){ if(score.best>=80){badgeClass='great';} else if(score.best>=60){badgeClass='ok';} else {badgeClass='weak';} badgeText=score.best+'%'; }
                const stars = score ? starsFor(score.best) : 0;
                const starStr = score ? ('⭐'.repeat(stars)+'☆'.repeat(3-stars)) : '—';
                const detail = score ? `${score.attempts} percubaan · ${completed?'✅ Selesai':'🔓 Belum selesai'}` : 'Belum dicuba';
                unitGrid.innerHTML += `
                    <div class="unit-row">
                        <span class="emoji">${unit.emoji}</span>
                        <div class="info"><div class="name">${unit.name}</div><div class="detail">${detail}</div></div>
                        <span class="stars">${starStr}</span>
                        <span class="score-badge ${badgeClass}">${badgeText}</span>
                    </div>`;
                labels.push(unit.name.length>12?unit.name.slice(0,12)+'…':unit.name);
                data.push(score?score.best:0);
                colors.push(!score?'rgba(170,183,184,.5)':score.best<60?'rgba(224,83,59,.75)':score.best<80?'rgba(217,116,43,.75)':'rgba(30,158,90,.75)');
            });

            new Chart(document.getElementById('scoreChart'), {
                type:'bar',
                data:{ labels, datasets:[{ label:'Skor Terbaik (%)', data, backgroundColor:colors, borderRadius:6 }] },
                options:{ responsive:true, maintainAspectRatio:true,
                    scales:{ y:{beginAtZero:true,max:100,ticks:{stepSize:20}}, x:{ticks:{font:{size:10}}} },
                    plugins:{ legend:{display:false} } }
            });

            const hasAudio = (typeof window.SAINS_AUDIO_DB !== 'undefined');
            document.getElementById('audio-note').innerHTML = hasAudio
                ? '🔊 <b>Suara natural aktif.</b> Audio gTTS pra-jana sedang digunakan.'
                : '🔊 <b>Nota suara:</b> aplikasi guna suara browser (boleh dengar robotik). Untuk suara Melayu lebih natural, jalankan <code>generate_sains_audio.py</code> sekali — fail audio akan auto-digunakan.';
        });
        function confirmClear(){ if(confirm('Padam semua rekod? Ini tidak boleh dikembalikan.')) clearAllData(); }
    </script>
</body>
</html>
