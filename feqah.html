<!DOCTYPE html>
<html lang="ms" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bijak KAFA — Nota Feqah Tahun 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #FDF6E3;
            --bg-card: #FFFFFF;
            --bg-tabs: rgba(255,255,255,0.95);
            --bg-header: linear-gradient(135deg, #059669 0%, #047857 100%);
            --text-primary: #2D3748;
            --text-secondary: #4A5568;
            --text-light: #718096;
            --border: #E2E8F0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            --correct-bg: #C6F6D5;
            --correct: #48BB78;
            --wrong-bg: #FED7D7;
            --wrong: #F56565;
        }

        [data-theme="dark"] {
            --bg-main: #1A202C;
            --bg-card: #2D3748;
            --bg-tabs: rgba(26,32,44,0.95);
            --bg-header: linear-gradient(135deg, #276749 0%, #1c4532 100%);
            --text-primary: #F7FAFC;
            --text-secondary: #E2E8F0;
            --text-light: #A0AEC0;
            --border: #4A5568;
            --shadow: 0 4px 20px rgba(0,0,0,0.5);
            
            --correct-bg: rgba(72, 187, 120, 0.2);
            --wrong-bg: rgba(245, 101, 101, 0.2);
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.8;
            font-size: 16px;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        .app-header {
            position: relative;
            background: var(--bg-header);
            color: white;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 4px 30px rgba(5, 150, 105, 0.4);
            transition: background 0.3s;
        }

        .app-header h1 { font-size: 28px; margin: 0 0 4px 0; }
        .app-header .subtitle { font-size: 14px; opacity: 0.9; }
        
        .btn-home-header {
            position: absolute;
            top: 12px;
            left: 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header-tools {
            position: absolute;
            top: 10px;
            right: 80px;
            display: flex;
            gap: 8px;
        }

        .header-tool-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 14px;
            transition: all 0.2s ease;
            text-decoration: none;
            padding: 0;
        }

        .header-tool-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }

        .version-badge {
            position: absolute;
            top: 12px;
            right: 16px;
            background: var(--bg-card);
            color: #059669;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .mode-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px 24px;
            background: var(--bg-tabs);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .mode-tab {
            padding: 10px 24px;
            border: 2px solid var(--border);
            border-radius: 50px;
            background: var(--bg-card);
            font-family: 'Lexend', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .mode-tab.active {
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
            border-color: transparent;
        }
        
        [data-theme="dark"] .mode-tab.active {
            background: linear-gradient(135deg, #38a169, #2f855a);
        }

        .topic-filters {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .topic-pill {
            padding: 8px 18px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            font-family: 'Lexend', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .topic-pill.active {
            background: #059669;
            color: white;
            border-color: transparent;
        }

        [data-theme="dark"] .topic-pill.active {
            background: #38a169;
        }

        .content-area {
            max-width: 900px;
            margin: 0 auto;
            padding: 8px 20px 40px;
        }

        .nota-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .nota-card h2 {
            color: #047857;
            margin-top: 0;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        [data-theme="dark"] .nota-card h2 {
            color: #68d391;
        }

        .nota-card h3 {
            color: #059669;
            margin-bottom: 8px;
        }

        [data-theme="dark"] .nota-card h3 {
            color: #9ae6b4;
        }

        .nota-card ul {
            padding-left: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        table, th, td {
            border: 1px solid var(--border);
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: rgba(5, 150, 105, 0.1);
            color: #047857;
        }

        [data-theme="dark"] th {
            background-color: rgba(72, 187, 120, 0.2);
            color: #68d391;
        }

        .hidden {
            display: none !important;
        }

        /* Quiz Styles */
        .quiz-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 24px;
            text-align: center;
            border: 2px solid var(--border);
            max-width: 600px;
            margin: 0 auto;
        }

        .quiz-question {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .quiz-option {
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-main);
            font-family: 'Lexend', sans-serif;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-primary);
        }

        .quiz-option:hover:not(.disabled) {
            border-color: #059669;
            transform: scale(1.02);
        }

        [data-theme="dark"] .quiz-option:hover:not(.disabled) {
            border-color: #38a169;
        }

        .quiz-option.correct {
            border-color: var(--correct);
            background: var(--correct-bg);
            color: #2D3748;
        }

        .quiz-option.wrong {
            border-color: var(--wrong);
            background: var(--wrong-bg);
            color: #2D3748;
        }

        .quiz-option.disabled {
            cursor: default;
            opacity: 0.7;
        }

        .quiz-next-btn {
            margin-top: 20px;
            padding: 14px 40px;
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Lexend', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: none;
        }

        [data-theme="dark"] .quiz-next-btn {
            background: linear-gradient(135deg, #38a169, #2f855a);
        }

        .quiz-next-btn.show { display: inline-block; }

        /* Progress Styles */
        .progress-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .progress-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .progress-info {
            flex: 1;
            margin-right: 20px;
        }
        .progress-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-transform: capitalize;
        }
        .progress-bar-track {
            background: #EDF2F7;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            overflow: hidden;
        }
        [data-theme="dark"] .progress-bar-track {
            background: #4A5568;
        }
        .progress-bar-value {
            height: 100%;
            background: linear-gradient(135deg, #059669, #047857);
            border-radius: 10px;
            transition: width 0.8s ease;
        }
        .progress-stats {
            font-size: 20px;
            font-weight: 700;
            color: #059669;
            min-width: 80px;
            text-align: right;
        }
        .progress-total {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 2px solid var(--border);
        }
        .progress-total h3 {
            margin: 0 0 10px 0;
            color: var(--text-secondary);
        }
        .progress-total .big-score {
            font-size: 48px;
            font-weight: 800;
            color: #059669;
        }
        .reset-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: transparent;
            color: #E53E3E;
            border: 2px solid #E53E3E;
            border-radius: 50px;
            font-family: 'Lexend', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-btn:hover {
            background: #E53E3E;
            color: white;
        }
    </style>
</head>
<body>
    <header class="app-header">
        <a href="index.html" class="btn-home-header">🏠 Menu Utama</a>
        <div class="header-tools">
            <button class="header-tool-btn" id="btn-dark-mode" onclick="toggleDarkMode()" title="Gelap/Terang">🌙</button>
        </div>
        <span class="version-badge">v1.5.1</span>
        <h1>Bijak KAFA — Feqah Tahun 2</h1>
        <div class="subtitle">Nota Lengkap & Kuiz Mengikut Silibus JAIS</div>
    </header>

    <div style="background: var(--bg-tabs); position: sticky; top: 0; z-index: 100;">
        <nav class="mode-tabs">
            <button class="mode-tab active" data-mode="browse" id="tab-browse">Nota Lengkap</button>
            <button class="mode-tab" data-mode="quiz" id="tab-quiz">Kuiz</button>
            <button class="mode-tab" data-mode="progress" id="tab-progress">📊 Progress</button>
            <a href="Nota_Pantas_Feqah.html" target="_blank" class="mode-tab" style="text-decoration: none; color: inherit;">Nota Pantas (1 Muka)</a>
        </nav>
    </div>

    <div class="topic-filters" id="topic-filters">
        <button class="topic-pill active" data-topic="istinjak">Istinjak</button>
        <button class="topic-pill" data-topic="wuduk">Wuduk</button>
        <button class="topic-pill" data-topic="najis">Najis</button>
        <button class="topic-pill" data-topic="hadas">Hadas</button>
        <button class="topic-pill" data-topic="mandiwajib">Mandi Wajib</button>
        <button class="topic-pill" data-topic="mandisunat">Mandi Sunat</button>
    </div>

    <main class="content-area">
        <div id="browse-view">
            <!-- Nota Content Injected by JS -->
        </div>

        <div id="quiz-view" class="hidden">
            <div id="quiz-container">
                <!-- Quiz Injected by JS -->
            </div>
        </div>

        <div id="progress-view" class="hidden">
            <!-- Progress Injected by JS -->
        </div>
    </main>

    <script>
        const notaData = {

            istinjak: `
                <div class="nota-card">
                    <h2>Pelajaran: Istinjak (إستنجاء)</h2>
                    <p>Menjaga kebersihan diri selepas membuang air adalah tuntutan agama.</p>
                    
                    <h3>Pengertian & Hukum</h3>
                    <ul>
                        <li><strong>Pengertian:</strong> Membersihkan qubul (kemaluan depan) atau dubur (kemaluan belakang) selepas membuang air kecil atau air besar.</li>
                        <li><strong>Hukum:</strong> <strong>Wajib</strong> ke atas setiap orang Islam.</li>
                    </ul>

                    <h3>Alat-alat Istinjak</h3>
                    <ul>
                        <li><strong>Alat Utama:</strong> Air Mutlak (paling afdal).</li>
                        <li><strong>Alat Tambahan (Benda Kesat):</strong> Batu, daun kering, kertas tisu, kulit kayu dan kain.</li>
                        <li><strong>Benda Haram Beristinjak:</strong> Kertas yang mengandungi ayat al-Quran/Hadis, makanan, tulang, benda licin (kaca/plastik/buluh).</li>
                    </ul>

                    <h3>Syarat Beristinjak Dengan Benda Kesat</h3>
                    <p>Jika ketiadaan air, kita boleh menggunakan benda kesat dengan syarat:</p>
                    <ol>
                        <li>Najis tersebut belum kering.</li>
                        <li>Najis tidak meleleh atau merebak ke tempat lain.</li>
                        <li>Mesti menyapu sekurang-kurangnya <strong>tiga kali</strong> sapuan (atau menggunakan 3 ketul batu / 1 batu yang ada 3 bucu).</li>
                    </ol>

                    <h3>Adab Qada' Hajat (Masuk Tandas)</h3>
                    <ul>
                        <li>Masuk ke tandas mendahulukan <strong>kaki kiri</strong>. Keluar mendahulukan <strong>kaki kanan</strong>.</li>
                        <li>Membaca doa masuk tandas.</li>
                        <li>Jangan bercakap, menyanyi atau makan minum di dalam tandas.</li>
                    </ul>
                </div>
            `,
            wuduk: `
                <div class="nota-card">
                    <h2>Pelajaran: Wuduk (وضوء)</h2>
                    
                    <h3>Pengertian & Hukum</h3>
                    <ul>
                        <li><strong>Pengertian:</strong> Membersihkan anggota badan tertentu dengan air mutlak berserta niat.</li>
                        <li><strong>Hukum Wajib:</strong> Untuk mendirikan solat, tawaf, dan menyentuh/membaca al-Quran.</li>
                        <li><strong>Hukum Sunat:</strong> Untuk tidur, membaca al-Quran (tanpa sentuh), dan masuk ke masjid.</li>
                    </ul>

                    <h3>Rukun Wuduk (6 Perkara)</h3>
                    <p>Rukun wajib dilakukan, jika tertinggal salah satu maka wuduk tidak sah:</p>
                    <ol>
                        <li><strong>Niat:</strong> <em>"Nawaitul wudu'a lillahi taala"</em> (Sahaja aku mengambil wuduk kerana Allah Taala).</li>
                        <li>Membasuh <strong>muka</strong>.</li>
                        <li>Membasuh kedua-dua <strong>tangan</strong> hingga ke siku.</li>
                        <li>Menyapu sedikit air ke atas bahagian <strong>kepala</strong>.</li>
                        <li>Membasuh kedua-dua <strong>kaki</strong> hingga ke buku lali.</li>
                        <li><strong>Tertib:</strong> Melakukan mengikut urutan yang betul di atas.</li>
                    </ol>

                    <h3>Perkara Sunat Wuduk</h3>
                    <ul>
                        <li>Membaca Bismillah.</li>
                        <li>Membasuh kedua-dua tapak tangan.</li>
                        <li>Berkumur-kumur dan memasukkan air ke dalam hidung.</li>
                        <li>Menyapu air ke seluruh telinga luar dan dalam.</li>
                        <li>Menghadap ke arah kiblat.</li>
                    </ul>

                    <h3>Perkara Yang Membatalkan Wuduk</h3>
                    <ul>
                        <li>Keluar sesuatu dari qubul atau dubur (kentut, kencing, berak).</li>
                        <li>Tidur tidak tetap punggung (tidur baring / mengiring).</li>
                        <li>Hilang akal (gila, pitam, mabuk).</li>
                        <li>Menyentuh kemaluan (qubul/dubur) dengan tapak tangan.</li>
                        <li>Bersentuh kulit antara lelaki dan perempuan bukan mahram tanpa berlapik.</li>
                    </ul>
                </div>
            `,
            najis: `
                <div class="nota-card">
                    <h2>Pelajaran Pertama: Najis (نجيس)</h2>
                    <p>Islam amat mementingkan kebersihan. Setiap ibadat memerlukan kita suci daripada najis.</p>

                    <h3>Pengertian Najis</h3>
                    <ul>
                        <li>Sesuatu benda kotor yang menyebabkan <strong>tidak sah</strong> ibadat seperti solat dan tawaf.</li>
                    </ul>

                    <h3>Bahagian Najis</h3>
                    <p>Najis terbahagi kepada tiga (3) bahagian:</p>
                    
                    <h4>1. Najis Mukhaffafah (مخففة) — Najis Ringan</h4>
                    <ul>
                        <li><strong>Maksud:</strong> Air kencing kanak-kanak lelaki yang berumur dua tahun ke bawah dan hanya minum susu ibunya sahaja.</li>
                        <li><strong>Cara Menyucikan:</strong>
                            <ol>
                                <li>Lap najis hingga kering.</li>
                                <li>Renjiskan air mutlak ke atas tempat yang terkena najis tersebut.</li>
                                <li>Lap semula hingga kering.</li>
                            </ol>
                        </li>
                    </ul>

                    <h4>2. Najis Mutawassitah (متوسطة) — Najis Pertengahan</h4>
                    <ul>
                        <li><strong>Maksud:</strong> Najis selain najis Mukhaffafah dan najis Mughallazah.</li>
                        <li><strong>Contoh:</strong> Darah, muntah, nanah, bangkai haiwan, tahi, arak dan air kencing.</li>
                        <li><strong>Cara Menyucikan:</strong>
                            <ol>
                                <li>Hilangkan najis (ain najis) yang terkena pada tempat tersebut.</li>
                                <li>Basuh dengan air mutlak hingga hilang bau, warna dan rasanya.</li>
                            </ol>
                        </li>
                    </ul>

                    <h4>3. Najis Mughallazah (مغلظة) — Najis Berat</h4>
                    <ul>
                        <li><strong>Maksud:</strong> Anjing dan babi serta keturunan daripada salah satu keduanya.</li>
                        <li><strong>Cara Menyucikan (Sertu):</strong>
                            <ol>
                                <li>Hilangkan najis pada tempat yang terkena najis.</li>
                                <li>Basuh satu kali dengan <strong>air tanah</strong>.</li>
                                <li>Basuh enam kali dengan <strong>air mutlak</strong>.</li>
                            </ol>
                        </li>
                    </ul>
                </div>
            `,
            hadas: `
                <div class="nota-card">
                    <h2>Pelajaran Kedua: Hadas (حدث)</h2>
                    
                    <h3>Pengertian Hadas</h3>
                    <ul>
                        <li>Hadas ialah keadaan <strong>tidak suci</strong> pada diri seseorang Islam yang menyebabkan <strong>tidak sah</strong> sesuatu ibadat tertentu (seperti solat dan tawaf).</li>
                    </ul>

                    <h3>Bahagian Hadas</h3>
                    <p>Hadas terbahagi kepada dua (2) jenis:</p>

                    <table>
                        <tr>
                            <th>Hadas Kecil (حدث كچيل)</th>
                            <th>Hadas Besar (حدث بسر)</th>
                        </tr>
                        <tr>
                            <td>
                                <strong>Sebab berhadas:</strong><br>
                                <ul>
                                    <li>Keluar sesuatu dari qubul atau dubur.</li>
                                    <li>Hilang akal (gila / pengsan / mabuk).</li>
                                    <li>Tidur tidak tetap punggung.</li>
                                    <li>Bersentuh kulit antara lelaki dan perempuan bukan mahram (tanpa lapik).</li>
                                    <li>Menyentuh kemaluan dengan tapak tangan.</li>
                                </ul>
                            </td>
                            <td>
                                <strong>Sebab berhadas:</strong><br>
                                <ul>
                                    <li>Keluar haid (bagi perempuan).</li>
                                    <li>Keluar nifas (darah selepas bersalin).</li>
                                    <li>Wiladah (bersalin).</li>
                                    <li>Jima' (bersetubuh).</li>
                                    <li>Keluar air mani.</li>
                                    <li>Meninggal dunia (kecuali mati syahid).</li>
                                </ul>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <strong>Cara Menyucikan:</strong><br>
                                Mengambil <strong>Wuduk</strong> atau <strong>Tayamum</strong>.
                            </td>
                            <td>
                                <strong>Cara Menyucikan:</strong><br>
                                Mandi <strong>Wajib</strong>.
                            </td>
                        </tr>
                    </table>
                </div>
            `,
            mandiwajib: `
                <div class="nota-card">
                    <h2>Pelajaran Ketiga: Mandi Wajib (مندي واجب)</h2>
                    
                    <h3>Pengertian & Hukum</h3>
                    <ul>
                        <li><strong>Pengertian:</strong> Mengalirkan dan meratakan air mutlak ke seluruh anggota badan dengan niat yang tertentu.</li>
                        <li><strong>Hukum:</strong> <strong>Wajib</strong> bagi orang yang berhadas besar untuk mengharuskan dia menunaikan ibadat.</li>
                    </ul>

                    <h3>Sebab-Sebab Wajib Mandi</h3>
                    <ul>
                        <li>Keluar darah haid atau nifas.</li>
                        <li>Wiladah (bersalin).</li>
                        <li>Keluar air mani.</li>
                        <li>Jima' (bersetubuh).</li>
                        <li>Meninggal dunia (kecuali mati syahid).</li>
                    </ul>

                    <h3>Rukun Mandi Wajib</h3>

        let currentTopic = 'istinjak';
        let currentQuizIndex = 0;
        let score = 0;
        
        let quizState = { topicScores: {} };

        // Elements
        const browseView = document.getElementById('browse-view');
        const quizView = document.getElementById('quiz-view');
        const progressView = document.getElementById('progress-view');
        const quizContainer = document.getElementById('quiz-container');
        
        // Tab Switching
        document.getElementById('tab-browse').addEventListener('click', () => setMode('browse'));
        document.getElementById('tab-quiz').addEventListener('click', () => setMode('quiz'));
        document.getElementById('tab-progress').addEventListener('click', () => setMode('progress'));

        // Topic Switching
        document.querySelectorAll('.topic-pill').forEach(pill => {
            pill.addEventListener('click', (e) => {
                document.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('active'));
                e.target.classList.add('active');
                currentTopic = e.target.getAttribute('data-topic');
                renderContent();
            });
        });

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tab-browse').classList.toggle('active', mode === 'browse');
            document.getElementById('tab-quiz').classList.toggle('active', mode === 'quiz');
            document.getElementById('tab-progress').classList.toggle('active', mode === 'progress');
            
            browseView.classList.add('hidden');
            quizView.classList.add('hidden');
            progressView.classList.add('hidden');
            
            if (mode === 'browse') {
                browseView.classList.remove('hidden');
                document.getElementById('topic-filters').classList.remove('hidden');
            } else if (mode === 'quiz') {
                quizView.classList.remove('hidden');
                document.getElementById('topic-filters').classList.remove('hidden');
                startQuiz();
            } else if (mode === 'progress') {
                progressView.classList.remove('hidden');
                document.getElementById('topic-filters').classList.add('hidden');
                renderProgressView();
            }
            renderContent();
        }

        function renderContent() {
            if (currentMode === 'browse') {
                browseView.innerHTML = notaData[currentTopic];
            }
        }

        function startQuiz() {
            currentQuizIndex = 0;
            score = 0;
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            const questions = quizData[currentTopic];
            if (currentQuizIndex >= questions.length) {
                // Quiz complete
                quizContainer.innerHTML = `
                    <div class="quiz-card">
                        <h2>Kuiz Tamat!</h2>
                        <div style="font-size: 48px; color: #059669; font-weight: bold;">${score} / ${questions.length}</div>
                        <button class="quiz-next-btn show" onclick="startQuiz()" style="margin-top: 20px;">Cuba Lagi</button>
                    </div>
                `;
                return;
            }

            const q = questions[currentQuizIndex];
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                optionsHtml += `<div class="quiz-option" onclick="selectAnswer(${idx}, ${q.answer})">${opt}</div>`;
            });

            quizContainer.innerHTML = `
                <div class="quiz-card">
                    <div style="text-align: left; color: #718096; margin-bottom: 10px;">Soalan ${currentQuizIndex + 1} daripada ${questions.length}</div>
                    <div class="quiz-question">${q.q}</div>
                    <div class="quiz-options">
                        ${optionsHtml}
                    </div>
                    <div id="explanation-box" style="display:none; margin-top:15px; padding:12px; border-radius:8px; background-color:#fee2e2; color:#991b1b; font-size:14px; border-left:4px solid #ef4444; line-height:1.4;"></div>
                    <button class="quiz-next-btn" id="next-btn" onclick="nextQuestion()">Seterusnya ➡️</button>
                </div>
            `;
        }

        window.selectAnswer = function(selectedIdx, correctIdx) {
            const options = document.querySelectorAll('.quiz-option');
            if (options[0].classList.contains('disabled')) return; // already answered

            const q = quizData[currentTopic][currentQuizIndex];

            options.forEach((opt, idx) => {
                opt.classList.add('disabled');
                if (idx === correctIdx) {
                    opt.classList.add('correct');
                } else if (idx === selectedIdx && selectedIdx !== correctIdx) {
                    opt.classList.add('wrong');
                }
            });

            if (!quizState.topicScores[currentTopic]) {
                quizState.topicScores[currentTopic] = { correct: 0, total: 0 };
            }
            quizState.topicScores[currentTopic].total++;

            if (selectedIdx === correctIdx) {
                score++;
                quizState.topicScores[currentTopic].correct++;
            } else {
                if (q.explanation) {
                    const explBox = document.getElementById('explanation-box');
                    explBox.style.display = 'block';
                    explBox.innerHTML = '<strong>💡 Tahukah anda?</strong><br>' + q.explanation;
                }
            }

            saveProgress();
            document.getElementById('next-btn').classList.add('show');
        }

        window.nextQuestion = function() {
            currentQuizIndex++;
            renderQuizQuestion();
        }

        function loadProgress() {
            const saved = localStorage.getItem('kafa_feqah_progress');
            if (saved) {
                try {
                    quizState.topicScores = JSON.parse(saved);
                } catch(e) {}
            }
        }

        function saveProgress() {
            localStorage.setItem('kafa_feqah_progress', JSON.stringify(quizState.topicScores));
        }

        function renderProgressView() {
            loadProgress();
            const scores = quizState.topicScores;
            const topics = ['istinjak', 'wuduk', 'najis', 'hadas', 'mandiwajib', 'mandisunat'];
            const topicNames = {
                'istinjak': 'Istinjak',
                'wuduk': 'Wuduk',
                'najis': 'Najis',
                'hadas': 'Hadas',
                'mandiwajib': 'Mandi Wajib',
                'mandisunat': 'Mandi Sunat'
            };

            let totalCorrect = 0;
            let totalAttempted = 0;
            let html = '<div class="progress-container">';

            let cardsHtml = '';
            topics.forEach(t => {
                const s = scores[t] || { correct: 0, total: 0 };
                totalCorrect += s.correct;
                totalAttempted += s.total;
                
                let pct = 0;
                if (s.total > 0) pct = Math.round((s.correct / s.total) * 100);
                
                cardsHtml += `
                    <div class="progress-card">
                        <div class="progress-info">
                            <div class="progress-title">${topicNames[t]}</div>
                            <div class="progress-bar-track">
                                <div class="progress-bar-value" style="width: ${pct}%;"></div>
                            </div>
                        </div>
                        <div class="progress-stats">${pct}%</div>
                    </div>
                `;
            });

            let overallPct = 0;
            if (totalAttempted > 0) overallPct = Math.round((totalCorrect / totalAttempted) * 100);

            html += `
                <div class="progress-total">
                    <h3>Pencapaian Keseluruhan</h3>
                    <div class="big-score">${overallPct}%</div>
                    <div style="color: var(--text-light); font-size: 14px;">${totalCorrect} betul daripada ${totalAttempted} cubaan</div>
                </div>
            `;
            
            html += cardsHtml;
            
            if (totalAttempted > 0) {
                html += `<button class="reset-btn" onclick="resetProgress()">Set Semula Rekod</button>`;
            } else {
                html += `<div style="text-align:center; color:var(--text-light); margin-top:20px;">Belum ada sebarang rekod kuiz dijawab.</div>`;
            }

            html += '</div>';
            progressView.innerHTML = html;
        }

        window.resetProgress = function() {
            if(confirm('Anda pasti mahu memadam semua rekod pencapaian Feqah?')) {
                localStorage.removeItem('kafa_feqah_progress');
                quizState.topicScores = {};
                renderProgressView();
            }
        }

        // Initialize
        loadProgress();
        renderContent();
    </script>
</body>
</html>
