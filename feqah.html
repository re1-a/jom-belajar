<!DOCTYPE html>
<html lang="ms" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bijak KAFA — Nota Feqah Tahun 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #FDF6E3;
            --bg-card: #FFFFFF;
            --bg-tabs: rgba(255,255,255,0.95);
            --bg-header: linear-gradient(135deg, #059669 0%, #047857 100%);
            --text-primary: #2D3748;
            --text-secondary: #4A5568;
            --text-light: #718096;
            --border: #E2E8F0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            --correct-bg: #C6F6D5;
            --correct: #48BB78;
            --wrong-bg: #FED7D7;
            --wrong: #F56565;
        }

        [data-theme="dark"] {
            --bg-main: #1A202C;
            --bg-card: #2D3748;
            --bg-tabs: rgba(26,32,44,0.95);
            --bg-header: linear-gradient(135deg, #276749 0%, #1c4532 100%);
            --text-primary: #F7FAFC;
            --text-secondary: #E2E8F0;
            --text-light: #A0AEC0;
            --border: #4A5568;
            --shadow: 0 4px 20px rgba(0,0,0,0.5);
            
            --correct-bg: rgba(72, 187, 120, 0.2);
            --wrong-bg: rgba(245, 101, 101, 0.2);
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.8;
            font-size: 16px;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        .app-header {
            position: relative;
            background: var(--bg-header);
            color: white;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 4px 30px rgba(5, 150, 105, 0.4);
            transition: background 0.3s;
        }

        .app-header h1 { font-size: 28px; margin: 0 0 4px 0; }
        .app-header .subtitle { font-size: 14px; opacity: 0.9; }
        
        .btn-home-header {
            position: absolute;
            top: 12px;
            left: 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header-tools {
            position: absolute;
            top: 10px;
            right: 80px;
            display: flex;
            gap: 8px;
        }

        .header-tool-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 14px;
            transition: all 0.2s ease;
            text-decoration: none;
            padding: 0;
        }

        .header-tool-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }

        .version-badge {
            position: absolute;
            top: 12px;
            right: 16px;
            background: var(--bg-card);
            color: #059669;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .mode-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px 24px;
            background: var(--bg-tabs);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .mode-tab {
            padding: 10px 24px;
            border: 2px solid var(--border);
            border-radius: 50px;
            background: var(--bg-card);
            font-family: 'Lexend', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .mode-tab.active {
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
            border-color: transparent;
        }
        
        [data-theme="dark"] .mode-tab.active {
            background: linear-gradient(135deg, #38a169, #2f855a);
        }

        .topic-filters {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .topic-pill {
            padding: 8px 18px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            font-family: 'Lexend', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .topic-pill.active {
            background: #059669;
            color: white;
            border-color: transparent;
        }

        [data-theme="dark"] .topic-pill.active {
            background: #38a169;
        }

        .content-area {
            max-width: 900px;
            margin: 0 auto;
            padding: 8px 20px 40px;
        }

        .nota-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .nota-card h2 {
            color: #047857;
            margin-top: 0;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        [data-theme="dark"] .nota-card h2 {
            color: #68d391;
        }

        .nota-card h3 {
            color: #059669;
            margin-bottom: 8px;
        }

        [data-theme="dark"] .nota-card h3 {
            color: #9ae6b4;
        }

        .nota-card ul {
            padding-left: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        table, th, td {
            border: 1px solid var(--border);
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: rgba(5, 150, 105, 0.1);
            color: #047857;
        }

        [data-theme="dark"] th {
            background-color: rgba(72, 187, 120, 0.2);
            color: #68d391;
        }

        .hidden {
            display: none !important;
        }

        /* Quiz Styles */
        .quiz-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 24px;
            text-align: center;
            border: 2px solid var(--border);
            max-width: 600px;
            margin: 0 auto;
        }

        .quiz-question {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .quiz-option {
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-main);
            font-family: 'Lexend', sans-serif;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-primary);
        }

        .quiz-option:hover:not(.disabled) {
            border-color: #059669;
            transform: scale(1.02);
        }

        [data-theme="dark"] .quiz-option:hover:not(.disabled) {
            border-color: #38a169;
        }

        .quiz-option.correct {
            border-color: var(--correct);
            background: var(--correct-bg);
            color: #2D3748;
        }

        .quiz-option.wrong {
            border-color: var(--wrong);
            background: var(--wrong-bg);
            color: #2D3748;
        }

        .quiz-option.disabled {
            cursor: default;
            opacity: 0.7;
        }

        .quiz-next-btn {
            margin-top: 20px;
            padding: 14px 40px;
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Lexend', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: none;
        }

        [data-theme="dark"] .quiz-next-btn {
            background: linear-gradient(135deg, #38a169, #2f855a);
        }

        .quiz-next-btn.show { display: inline-block; }
    </style>
</head>

    <script>
        const notaData = {
            najis: `
                <div class="nota-card">
                    <h2>Pelajaran Pertama: Najis (نجيس)</h2>
                    <p>Islam amat mementingkan kebersihan. Setiap ibadat memerlukan kita suci daripada najis.</p>

                    <h3>Pengertian Najis</h3>
                    <ul>
                        <li>Sesuatu benda kotor yang menyebabkan <strong>tidak sah</strong> ibadat seperti solat dan tawaf.</li>
                    </ul>

                    <h3>Bahagian Najis</h3>
                    <p>Najis terbahagi kepada tiga (3) bahagian:</p>
                    
                    <h4>1. Najis Mukhaffafah (مخففة) — Najis Ringan</h4>
                    <ul>
                        <li><strong>Maksud:</strong> Air kencing kanak-kanak lelaki yang berumur dua tahun ke bawah dan hanya minum susu ibunya sahaja.</li>
                        <li><strong>Cara Menyucikan:</strong>
                            <ol>
                                <li>Lap najis hingga kering.</li>
                                <li>Renjiskan air mutlak ke atas tempat yang terkena najis tersebut.</li>
                                <li>Lap semula hingga kering.</li>
                            </ol>
                        </li>
                    </ul>

                    <h4>2. Najis Mutawassitah (متوسطة) — Najis Pertengahan</h4>
                    <ul>
                        <li><strong>Maksud:</strong> Najis selain najis Mukhaffafah dan najis Mughallazah.</li>
                        <li><strong>Contoh:</strong> Darah, muntah, nanah, bangkai haiwan, tahi, arak dan air kencing.</li>
                        <li><strong>Cara Menyucikan:</strong>
                            <ol>
                                <li>Hilangkan najis (ain najis) yang terkena pada tempat tersebut.</li>
                                <li>Basuh dengan air mutlak hingga hilang bau, warna dan rasanya.</li>
                            </ol>
                        </li>
                    </ul>

                    <h4>3. Najis Mughallazah (مغلظة) — Najis Berat</h4>
                    <ul>
                        <li><strong>Maksud:</strong> Anjing dan babi serta keturunan daripada salah satu keduanya.</li>
                        <li><strong>Cara Menyucikan (Sertu):</strong>
                            <ol>
                                <li>Hilangkan najis pada tempat yang terkena najis.</li>
                                <li>Basuh satu kali dengan <strong>air tanah</strong>.</li>
                                <li>Basuh enam kali dengan <strong>air mutlak</strong>.</li>
                            </ol>
                        </li>
                    </ul>
                </div>
            `,
            hadas: `
                <div class="nota-card">
                    <h2>Pelajaran Kedua: Hadas (حدث)</h2>
                    
                    <h3>Pengertian Hadas</h3>
                    <ul>
                        <li>Hadas ialah keadaan <strong>tidak suci</strong> pada diri seseorang Islam yang menyebabkan <strong>tidak sah</strong> sesuatu ibadat tertentu (seperti solat dan tawaf).</li>
                    </ul>

                    <h3>Bahagian Hadas</h3>
                    <p>Hadas terbahagi kepada dua (2) jenis:</p>

                    <table>
                        <tr>
                            <th>Hadas Kecil (حدث كچيل)</th>
                            <th>Hadas Besar (حدث بسر)</th>
                        </tr>
                        <tr>
                            <td>
                                <strong>Sebab berhadas:</strong><br>
                                <ul>
                                    <li>Keluar sesuatu dari qubul atau dubur.</li>
                                    <li>Hilang akal (gila / pengsan / mabuk).</li>
                                    <li>Tidur tidak tetap punggung.</li>
                                    <li>Bersentuh kulit antara lelaki dan perempuan bukan mahram (tanpa lapik).</li>
                                    <li>Menyentuh kemaluan dengan tapak tangan.</li>
                                </ul>
                            </td>
                            <td>
                                <strong>Sebab berhadas:</strong><br>
                                <ul>
                                    <li>Keluar haid (bagi perempuan).</li>
                                    <li>Keluar nifas (darah selepas bersalin).</li>
                                    <li>Wiladah (bersalin).</li>
                                    <li>Jima' (bersetubuh).</li>
                                    <li>Keluar air mani.</li>
                                    <li>Meninggal dunia (kecuali mati syahid).</li>
                                </ul>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <strong>Cara Menyucikan:</strong><br>
                                Mengambil <strong>Wuduk</strong> atau <strong>Tayamum</strong>.
                            </td>
                            <td>
                                <strong>Cara Menyucikan:</strong><br>
                                Mandi <strong>Wajib</strong>.
                            </td>
                        </tr>
                    </table>
                </div>
            `,
            mandiwajib: `
                <div class="nota-card">
                    <h2>Pelajaran Ketiga: Mandi Wajib (مندي واجب)</h2>
                    
                    <h3>Pengertian & Hukum</h3>
                    <ul>
                        <li><strong>Pengertian:</strong> Mengalirkan dan meratakan air mutlak ke seluruh anggota badan dengan niat yang tertentu.</li>
                        <li><strong>Hukum:</strong> <strong>Wajib</strong> bagi orang yang berhadas besar untuk mengharuskan dia menunaikan ibadat.</li>
                    </ul>

                    <h3>Sebab-Sebab Wajib Mandi</h3>
                    <ul>
                        <li>Keluar darah haid atau nifas.</li>
                        <li>Wiladah (bersalin).</li>
                        <li>Keluar air mani.</li>
                        <li>Jima' (bersetubuh).</li>
                        <li>Meninggal dunia (kecuali mati syahid).</li>
                    </ul>

                    <h3>Rukun Mandi Wajib</h3>
                    <p>Hanya ada <strong>dua</strong> rukun mandi wajib:</p>
                    <ol>
                        <li><strong>Niat:</strong> Niat dilakukan di dalam hati ketika air mula mengenai mana-mana anggota badan.<br>
                            Lafaz Niat:<br>
                            <blockquote style="font-family: 'Amiri', serif; font-size: 26px; direction: rtl; margin: 10px 0; background: rgba(5, 150, 105, 0.05); padding: 15px; border-radius: 8px; border-right: 4px solid #059669;">نَوَيْتُ رَفْعَ الْحَدَثِ الْأَكْبَرِ لِلَّهِ تَعَالَى</blockquote>
                            <em>"Sahaja aku mengangkat hadas besar kerana Allah Taala."</em>
                        </li>
                        <li><strong>Meratakan air:</strong> Meratakan air mutlak ke seluruh anggota badan meliputi kulit, rambut, dan bulu.</li>
                    </ol>

                    <h3>Larangan Ketika Berhadas Besar</h3>
                    <p>Seseorang yang berhadas besar diharamkan daripada melakukan perkara berikut:</p>
                    <ul>
                        <li>Menunaikan solat (fardu dan sunat).</li>
                        <li>Melakukan tawaf di Kaabah.</li>
                        <li>Menyentuh, membawa atau membaca Al-Quran.</li>
                        <li>Berhenti atau duduk di dalam masjid.</li>
                    </ul>
                </div>
            `,
            mandisunat: `
                <div class="nota-card">
                    <h2>Pelajaran Keempat: Mandi Sunat (مندي سنة)</h2>
                    
                    <h3>Pengertian Mandi Sunat</h3>
                    <ul>
                        <li>Mandi yang <strong>mendapat pahala</strong> jika dilakukan, dan <strong>tidak berdosa</strong> jika ditinggalkan.</li>
                    </ul>

                    <h3>Contoh-contoh Mandi Sunat</h3>
                    <ul>
                        <li>Mandi sunat hari Jumaat.</li>
                        <li>Mandi sunat dua Hari Raya (Aidilfitri dan Aidiladha).</li>
                        <li>Mandi sunat sebelum ihram (Haji dan Umrah).</li>
                        <li>Mandi sunat gerhana matahari atau bulan.</li>
                        <li>Mandi setelah memandikan jenazah.</li>
                        <li>Mandi apabila baru memeluk Islam.</li>
                    </ul>

                    <h3>Niat Mandi Sunat Hari Jumaat</h3>
                    <ul>
                        <li>Lafaz Niat:<br>
                            <blockquote style="font-family: 'Amiri', serif; font-size: 26px; direction: rtl; margin: 10px 0; background: rgba(5, 150, 105, 0.05); padding: 15px; border-radius: 8px; border-right: 4px solid #059669;">نَوَيْتُ غُسْلَ يَوْمِ الْجُمُعَةِ سُنَّةً لِلَّهِ تَعَالَى</blockquote>
                            <em>"Sahaja aku mandi sunat hari Jumaat kerana Allah Taala."</em>
                        </li>
                    </ul>
                </div>
            `
        };

        const quizData = {
            najis: [
                { q: "Najis adalah sesuatu benda yang _____.", options: ["suci", "kotor", "bersih", "cantik"], answer: 1 },
                { q: "Berapakah jenis najis dalam Islam?", options: ["Dua", "Tiga", "Empat", "Lima"], answer: 1 },
                { q: "Manakah antara berikut adalah contoh najis?", options: ["Pasir", "Lumpur", "Air arak", "Batu"], answer: 2 },
                { q: "Pilih padanan yang betul bagi jenis najis.", options: ["Mukhaffafah - Muntah", "Mutawassitah - Bangkai", "Mughallazah - Air liur", "Mutawassitah - Babi"], answer: 1 },

                { q: "Apakah cara menyucikan najis Mukhaffafah?", options: ["Renjis air mutlak", "Basuh dengan sabun", "Sertu dengan tanah", "Basuh 7 kali"], answer: 0 },
                { q: "Najis Mutawassitah bermaksud najis _____.", options: ["Berat", "Pertengahan", "Ringan", "Besar"], answer: 1 },
                { q: "Antara berikut, yang manakah contoh najis Mutawassitah?", options: ["Kencing bayi lelaki < 2 tahun", "Anjing dan babi", "Darah, nanah dan muntah", "Batu dan kayu"], answer: 2 },
                { q: "Cara menyucikan najis Mutawassitah ialah membasuhnya dengan air mutlak sehingga hilang bau, warna dan _____.", options: ["Kotoran", "Rasa", "Sakit", "Debu"], answer: 1 },

                { q: "Anjing, babi dan keturunannya adalah tergolong dalam najis _____.", options: ["Mukhaffafah", "Mutawassitah", "Mughallazah", "Hadas"], answer: 2 },
                { q: "Cara menyucikan najis Mughallazah dinamakan sebagai _____.", options: ["Wuduk", "Tayamum", "Sertu", "Istinja'"], answer: 2 },
                { q: "Menyucikan najis Mughallazah (sertu) memerlukan 1 kali basuhan air tanah dan _____ kali basuhan air mutlak.", options: ["Dua", "Empat", "Enam", "Tujuh"], answer: 2 }
            ],
            hadas: [
                { q: "Hadas kecil bermaksud keadaan tidak suci yang mewajibkan seseorang itu mengambil _____.", options: ["Wuduk", "Mandi wajib", "Mandi sunat", "Tawaf"], answer: 0 },
                { q: "Berikut merupakan sebab-sebab berlakunya hadas besar KECUALI...", options: ["Keluar darah haid", "Keluar air mani", "Hilang akal", "Melahirkan anak"], answer: 2 },
                { q: "Manakah antara berikut menyebabkan hadas kecil?", options: ["Tidur tidak tetap punggung", "Keluar darah nifas", "Jima' (bersetubuh)", "Meninggal dunia"], answer: 0 },

                { q: "Cara untuk menyucikan diri daripada hadas besar adalah dengan...", options: ["Tayamum", "Wuduk", "Mandi sunat", "Mandi wajib"], answer: 3 },
                { q: "Hadas terbahagi kepada berapa bahagian?", options: ["Dua", "Tiga", "Empat", "Lima"], answer: 0 },
                { q: "Keluar sesuatu dari qubul atau dubur (seperti kentut atau kencing) menyebabkan berlakunya hadas ____.", options: ["Besar", "Sederhana", "Kecil", "Ringan"], answer: 2 },
                { q: "Pengsan, mabuk atau gila adalah contoh bagi sebab ____.", options: ["Hilang akal", "Batal mandi", "Hadas besar", "Sertu"], answer: 0 },

                { q: "Hadas besar mewajibkan seseorang itu melaksanakan ____.", options: ["Solat", "Mandi Wajib", "Puasa", "Tayamum"], answer: 1 },

                { q: "Perkataan 'Wiladah' yang menjadi sebab hadas besar bermaksud _____.", options: ["Meninggal dunia", "Hilang akal", "Bersetubuh", "Melahirkan anak"], answer: 3 },
                { q: "Bersetubuh (jima') menyebabkan suami dan isteri berhadas ____.", options: ["Besar", "Kecil", "Ringan", "Mutawassitah"], answer: 0 },
                { q: "Seseorang Islam yang meninggal dunia wajib dimandikan KECUALI mati ____.", options: ["Syahid", "Lemas", "Kemalangan", "Sakit tua"], answer: 0 },
                { q: "Orang yang berhadas kecil (tiada wuduk) dilarang daripada menunaikan ____.", options: ["Zakat", "Puasa", "Solat", "Doa"], answer: 2 }
            ],
            mandiwajib: [

                { q: "Niat mandi wajib di dalam hati mesti dilakukan ketika...", options: ["Mengambil wuduk", "Air mula mengenai anggota badan", "Selesai mandi", "Masuk ke dalam bilik air"], answer: 1 },
                { q: "Apakah bacaan niat untuk mengangkat hadas besar?", options: ["Nawaitul wudu'a...", "Nawaitut tayammuma...", "Nawaitu raf'al hadathil akbar...", "Nawaitul ghusla sunnatan..."], answer: 2 },
                { q: "Antara berikut, manakah rukun mandi wajib?", options: ["Mengambil wuduk", "Meratakan air ke seluruh badan", "Membasuh kaki", "Mendahulukan anggota kanan"], answer: 1 },
                { q: "Orang yang sedang berhadas besar tidak sah melakukan ibadat _____.", options: ["Puasa", "Zikir", "Solat dan Tawaf", "Sedekah"], answer: 2 },
                { q: "Meratakan air mutlak ke seluruh anggota badan dengan niat tertentu dinamakan...", options: ["Wuduk", "Istinja'", "Mandi wajib", "Tayamum"], answer: 2 },
                { q: "Apakah hukum mandi wajib bagi orang yang berhadas besar?", options: ["Sunat", "Wajib", "Makruh", "Harus"], answer: 1 },
                { q: "Berapakah bilangan rukun mandi wajib menurut silibus KAFA yang dipelajari?", options: ["Satu", "Dua", "Empat", "Lima"], answer: 1 },
                { q: "Rukun mandi wajib yang pertama ialah ____.", options: ["Membasuh tangan", "Mengambil wuduk", "Niat", "Meratakan air"], answer: 2 },
                { q: "Maksud niat: 'Sahaja aku mengangkat hadas besar kerana Allah Taala' ialah untuk mandi ____.", options: ["Sunat", "Wajib", "Haid", "Jenazah"], answer: 1 },
                { q: "Semasa mandi wajib, air mesti diratakan ke seluruh anggota badan, terutamanya di celah lipatan dan ____.", options: ["Kulit dan rambut/bulu", "Mata", "Telinga dalam", "Gigi"], answer: 0 },
                { q: "Berikut ialah perkara yang DILARANG semasa berhadas besar KECUALI...", options: ["Solat", "Tawaf", "Membaca Al-Quran", "Berzikir"], answer: 3 },
                { q: "Menyentuh, membawa atau membaca Al-Quran adalah _____ ketika berhadas besar.", options: ["Sunat", "Harus", "Haram / Dilarang", "Makruh"], answer: 2 },
                { q: "Berhenti atau duduk berehat di dalam masjid adalah _____ bagi orang yang berhadas besar.", options: ["Sunat", "Harus", "Haram / Dilarang", "Makruh"], answer: 2 },
                { q: "Apakah jenis air yang sah digunakan untuk mandi wajib?", options: ["Air kopi", "Air mutlak", "Air tanah", "Air sabun"], answer: 1 }
            ],
            mandisunat: [
                { q: "Mandi sunat bermaksud mandi yang mendapat _____ jika dilakukan.", options: ["Dosa", "Pahala", "Kemurkaan", "Harta"], answer: 1 },
                { q: "Seseorang digalakkan mandi sunat bagi tujuan hadir ke solat _____.", options: ["Zohor", "Jumaat", "Asar", "Maghrib"], answer: 1 },
                { q: "Lafaz 'Nawaitul ghusla sunnatan lillahi taala' adalah bacaan niat untuk...", options: ["Mandi wajib", "Mandi sunat hari Jumaat", "Puasa", "Wuduk"], answer: 1 },
                { q: "Kita disunatkan mandi pada pagi 1 Syawal sempena hari raya _____.", options: ["Aidiladha", "Kemerdekaan", "Korban", "Aidilfitri"], answer: 3 },
                { q: "Manakah antara berikut BUKAN mandi sunat?", options: ["Mandi kerana ihram", "Mandi hari raya", "Mandi selepas keluar haid", "Mandi selepas memandikan jenazah"], answer: 2 },
                { q: "Hukum meninggalkan perbuatan mandi sunat adalah ____.", options: ["Berdosa", "Tidak berdosa", "Haram", "Wajib diganti"], answer: 1 },
                { q: "Mandi sunat hari raya kebiasaannya dilakukan sebanyak _____ kali setahun.", options: ["Satu", "Dua", "Tiga", "Empat"], answer: 1 },
                { q: "Jemaah haji atau umrah disunatkan mandi sunat sebelum memakai pakaian ____.", options: ["Jubah", "Ihram", "Harian", "Kerja"], answer: 1 },
                { q: "Mandi sunat juga digalakkan ketika berlaku fenomena cakerawala iaitu ____.", options: ["Hujan lebat", "Gerhana matahari atau bulan", "Pelangi", "Matahari terbenam"], answer: 1 },
                { q: "Selepas kita menguruskan dan memandikan jenazah, kita digalakkan untuk ____.", options: ["Tidur", "Mandi wajib", "Mandi sunat", "Makan"], answer: 2 },
                { q: "Apabila seseorang yang bukan Islam baru memeluk agama Islam, dia digalakkan untuk ____.", options: ["Tukar nama", "Mandi sunat", "Berkhatan terus", "Berpuasa"], answer: 1 },
                { q: "Mengamalkan mandi sunat dapat membersihkan badan serta menambahkan _____.", options: ["Harta kekayaan", "Pahala dan kesegaran", "Umur", "Dosa"], answer: 1 },
                { q: "Niat 'Sahaja aku mandi sunat Aidiladha kerana Allah Taala' dibaca pada waktu ____.", options: ["Hari Raya Korban", "Hari Raya Puasa", "Hari Jumaat", "Hari Guru"], answer: 0 },
                { q: "Selain mandi sunat, umat Islam disunatkan memakai pakaian yang bersih dan _____ ke masjid.", options: ["Ketat", "Wangi", "Nipis", "Koyak"], answer: 1 },
                { q: "Mandi sunat hendaklah dilakukan menggunakan air ____.", options: ["Mutlak", "Syampu", "Sirap", "Mawar"], answer: 0 }
            ]
        };

        // Dark Mode Logic
        function toggleDarkMode() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                document.getElementById('btn-dark-mode').textContent = '🌙';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                document.getElementById('btn-dark-mode').textContent = '☀️';
            }
        }

        // Initialize Theme
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('btn-dark-mode').textContent = '☀️';
        }

        // UI State
        let currentMode = 'browse';
        let currentTopic = 'najis';
        let currentQuizIndex = 0;
        let score = 0;

        // Elements
        const browseView = document.getElementById('browse-view');
        const quizView = document.getElementById('quiz-view');
        const quizContainer = document.getElementById('quiz-container');
        
        // Tab Switching
        document.getElementById('tab-browse').addEventListener('click', () => setMode('browse'));
        document.getElementById('tab-quiz').addEventListener('click', () => setMode('quiz'));

        // Topic Switching
        document.querySelectorAll('.topic-pill').forEach(pill => {
            pill.addEventListener('click', (e) => {
                document.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('active'));
                e.target.classList.add('active');
                currentTopic = e.target.getAttribute('data-topic');
                renderContent();
            });
        });

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tab-browse').classList.toggle('active', mode === 'browse');
            document.getElementById('tab-quiz').classList.toggle('active', mode === 'quiz');
            
            if (mode === 'browse') {
                browseView.classList.remove('hidden');
                quizView.classList.add('hidden');
            } else {
                browseView.classList.add('hidden');
                quizView.classList.remove('hidden');
                startQuiz();
            }
            renderContent();
        }

        function renderContent() {
            if (currentMode === 'browse') {
                browseView.innerHTML = notaData[currentTopic];
            }
        }

        function startQuiz() {
            currentQuizIndex = 0;
            score = 0;
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            const questions = quizData[currentTopic];
            if (currentQuizIndex >= questions.length) {
                // Quiz complete
                quizContainer.innerHTML = `
                    <div class="quiz-card">
                        <h2>Kuiz Tamat!</h2>
                        <div style="font-size: 48px; color: #059669; font-weight: bold;">${score} / ${questions.length}</div>
                        <button class="quiz-next-btn show" onclick="startQuiz()" style="margin-top: 20px;">Cuba Lagi</button>
                    </div>
                `;
                return;
            }

            const q = questions[currentQuizIndex];
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                optionsHtml += `<div class="quiz-option" onclick="selectAnswer(${idx}, ${q.answer})">${opt}</div>`;
            });

            quizContainer.innerHTML = `
                <div class="quiz-card">
                    <div style="text-align: left; color: #718096; margin-bottom: 10px;">Soalan ${currentQuizIndex + 1} daripada ${questions.length}</div>
                    <div class="quiz-question">${q.q}</div>
                    <div class="quiz-options">
                        ${optionsHtml}
                    </div>
                    <div id="explanation-box" style="display:none; margin-top:15px; padding:12px; border-radius:8px; background-color:#fee2e2; color:#991b1b; font-size:14px; border-left:4px solid #ef4444; line-height:1.4;"></div>
                    <button class="quiz-next-btn" id="next-btn" onclick="nextQuestion()">Seterusnya ➡️</button>
                </div>
            `;
        }

        window.selectAnswer = function(selectedIdx, correctIdx) {
            const options = document.querySelectorAll('.quiz-option');
            if (options[0].classList.contains('disabled')) return; // already answered

            const q = quizData[currentTopic][currentQuizIndex];

            options.forEach((opt, idx) => {
                opt.classList.add('disabled');
                if (idx === correctIdx) {
                    opt.classList.add('correct');
                } else if (idx === selectedIdx && selectedIdx !== correctIdx) {
                    opt.classList.add('wrong');
                }
            });

            if (selectedIdx === correctIdx) {
                score++;
            } else {
                if (q.explanation) {
                    const explBox = document.getElementById('explanation-box');
                    explBox.style.display = 'block';
                    explBox.innerHTML = '<strong>💡 Tahukah anda?</strong><br>' + q.explanation;
                }
            }

            document.getElementById('next-btn').classList.add('show');
        }

        window.nextQuestion = function() {
            currentQuizIndex++;
            renderQuizQuestion();
        }

        // Initialize
        renderContent();
    </script>
</body>
</html>
